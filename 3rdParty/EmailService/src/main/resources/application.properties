spring.application.name=EmailService

server.port=8085

###################################
#       openapi - swagger
###################################
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
openapi.dev-url=http://localhost:8085
openapi.prod-url=http://localhost:8085
springdoc.swagger-ui.path=/docs

###################################
#            database
###################################
spring.datasource.url=jdbc:postgresql://localhost:5435/emaildb
spring.datasource.username=admin
spring.datasource.password=admin

###################################
#               jpa
###################################
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

###################################
#           RabbitMQ
###################################
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=2000ms
spring.rabbitmq.listener.simple.retry.max-attempts=3

###################################
#       Custom Properties
###################################
email.templates.defaultLocale=en_AU
messaging.exchange.store=store.events
messaging.queue.email=email.order-events
messaging.routingKeys=order.*,delivery.*,refund.*

###################################
#           docker
###################################
spring.docker.compose.enabled=true

###################################
#           logger
###################################
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.email.emailservice=DEBUG
logging.level.org.springframework.amqp=DEBUG
# colorful
spring.output.ansi.enabled=ALWAYS
# output
logging.file.name=logs/app.log
