spring.application.name=DeliveryCo

server.port=8084

###################################
#       openapi - swagger
###################################
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
openapi.dev-url=http://localhost:8084
openapi.prod-url=http://localhost:8084
springdoc.swagger-ui.path=/docs

###################################
#             polling
###################################
delivery.poll.delay-ms=30000
delivery.poll.initial-delay-ms=5000
# application-docker.properties (or your active profile)
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=true


###################################
#           RabbitMQ
###################################
management.health.rabbit.enabled=false
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin

spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true

# Prevent listening exceptions from causing infinite reentry into the queue
spring.rabbitmq.listener.simple.default-requeue-rejected=false

###################################
#            database
###################################
spring.datasource.url=jdbc:postgresql://localhost:5434/delivery
spring.datasource.username=admin
spring.datasource.password=admin

###################################
#               jpa
###################################
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto= update

###################################
#           docker
###################################
spring.docker.compose.enabled=true

###################################
#           logger
###################################
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.yourapp=DEBUG
# colorful
spring.output.ansi.enabled=ALWAYS
# output
logging.file.name=logs/app.log