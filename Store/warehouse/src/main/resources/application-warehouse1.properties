spring.application.name=warehouse1

server.port=8081

###################################
#            grpc server
###################################
grpc.server.port=9091
warehouse.id=WH-01

###################################
#            database
###################################
spring.datasource.url=jdbc:postgresql://localhost:5433/warehouse1
spring.datasource.username=admin
spring.datasource.password=admin

###################################
#               jpa
###################################
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto= update

# initialize stock data on warehouse1 startup
spring.sql.init.mode=always
#spring.sql.init.data-locations=classpath:db/insert_stock1.sql
